<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAJ HUB Mobile App Preview</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link rel="stylesheet" href="src/styles.css?v=3" />
  </head>
  <body>
    <main class="app-preview" aria-label="TAJ HUB resident mobile app preview">
      <section class="phone-screen">
        <div class="status-bar">
          <span>9:41</span>
          <span>●●● 5G</span>
        </div>
        <div id="screenRoot" class="screen-root">
          <section class="screen welcome-screen">
            <div class="brand-lockup">
              <strong>TAJ HUB</strong>
              <span>Resident App</span>
            </div>
            <div class="hero-copy">
              <p class="eyebrow">تجربه اختصاصی ساکنین</p>
              <h1>به TAJ HUB خوش آمدید</h1>
              <p>ورود سریع، امن و بدون فرم‌های طولانی</p>
            </div>
            <div class="action-stack">
              <button class="primary-button" type="button">در حال آماده‌سازی پریویو...</button>
              <small>اگر صفحه ثابت ماند، مرورگر را hard refresh کنید.</small>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="src/main.js?v=3" defer></script>
  </body>
</html>
